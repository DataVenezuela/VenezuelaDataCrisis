name: Consolidate

on:
  schedule:
    - cron: "5,25,45 * * * *"   # cada 20 minutos (offset de ingest)
  workflow_dispatch: {}

concurrency:
  group: consolidate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Dry-run consolidation (verificación)
        env:
          PII_SALT: ${{ secrets.PII_HMAC_SECRET }}
          PII_HMAC_SECRET: ${{ secrets.PII_HMAC_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_CONSOLIDATION_JWT: ${{ secrets.SUPABASE_CONSOLIDATION_JWT }}
        run: |
          python -m scrapers.cli consolidate \
            --dry-run \
            --config scrapers/config/sources.custom.yaml

      - name: Run consolidation
        env:
          PII_SALT: ${{ secrets.PII_HMAC_SECRET }}
          PII_HMAC_SECRET: ${{ secrets.PII_HMAC_SECRET }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_CONSOLIDATION_JWT: ${{ secrets.SUPABASE_CONSOLIDATION_JWT }}
        run: |
          set -o pipefail
          python -m scrapers.cli consolidate \
            --config scrapers/config/sources.custom.yaml \
            2>&1 | tee consolidation.log

      - name: Upload consolidation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidation-log-${{ github.run_number }}
          path: consolidation.log
          retention-days: 7
