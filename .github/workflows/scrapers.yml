name: Scrapers

# Cron horario. También puede lanzarse manualmente desde Actions UI.
# El offset de :05 evita solapar con el build job de D1 (que corre en :30/:00).
on:
  schedule:
    - cron: "5 * * * *"   # cada hora a los :05 (UTC)
  workflow_dispatch:
    inputs:
      config:
        description: "Config YAML de fuentes (relativa al repo)"
        required: false
        default: "scrapers/config/sources.venezuela.starter.yaml"
      limit:
        description: "Máx documentos por fuente (vacío = sin límite)"
        required: false
        default: ""

# Un solo run a la vez. Si corre lento y llega el siguiente cron, se cancela el viejo.
concurrency:
  group: scrapers
  cancel-in-progress: true

permissions:
  contents: read   # mínimo necesario; no se commitea nada

env:
  OUTPUT_DIR: scrapers/runtime_output
  SOURCES_CONFIG: ${{ github.event.inputs.config || 'scrapers/config/sources.venezuela.starter.yaml' }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Validate source config
        run: |
          python -m scrapers.cli validate --config "$SOURCES_CONFIG"

      - name: Run pipeline
        env:
          PII_SALT: ${{ secrets.PII_SALT }}
          PII_HMAC_SECRET: ${{ secrets.PII_HMAC_SECRET }}
        run: |
          LIMIT_ARG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          python -m scrapers.cli run \
            --config "$SOURCES_CONFIG" \
            --output-dir "$OUTPUT_DIR" \
            $LIMIT_ARG

      # TODO: implementar tools/ingest_supabase/ para ingestar el JSONL a Supabase.
      # Una vez implementado, reemplazar este step por:
      #   pip install -r tools/requirements.txt
      #   python -m tools.ingest_supabase.cli --output-dir "$OUTPUT_DIR"
      - name: Ingest JSONL to Supabase (pendiente)
        run: |
          echo "Ingesta a Supabase aún no implementada. Ver docs/implementation-plan.md Fase 2."

      - name: Cleanup runtime output
        if: always()
        run: |
          # Los JSONL son datos reales sanitizados. Los borramos del runner
          # al finalizar; nunca se commitean (también bloqueado en ci.yml).
          rm -rf "$OUTPUT_DIR"
