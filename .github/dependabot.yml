version: 2
updates:
  # Dependencias Python del pipeline
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "scrapers"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Agrupa actualizaciones menores/patch en un solo PR para no inundar
    # de PRs individuales; las major siguen viniendo separadas para
    # revisión manual obligatoria.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Versiones de actions usadas en los workflows (actions/checkout@v4, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"