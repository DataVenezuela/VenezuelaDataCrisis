version: 2
updates:
  # Dependencias Python del pipeline
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "scrapers"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Agrupa TODAS las actualizaciones (incluidas major) en un solo PR
    # semanal para no inundar de PRs individuales.
    groups:
      python-deps:
        patterns:
          - "*"

  # Versiones de actions usadas en los workflows (actions/checkout@v4, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions-deps:
        patterns:
          - "*"