# Template for the production scraper source config (thin format).
#
# Copy this to scrapers/config/sources.custom.yaml (gitignored) and fill in the
# real source_id UUIDs. In the thin format the repo NEVER stores a source's
# identity (url, name, keywords): each entry is only the binding
#   source_id (UUID)  ->  parser (the "shape")  + enabled
# and the scraper resolves url/name/type/trust_tier/refresh_minutes from the
# `sources` table in Supabase at load time. See ADR 0009.
#
# Prerequisites for a thin entry:
#   1. The maintainer has seeded a row in `sources` (url, source_type,
#      display_name, required_keywords, governed_tier, refresh_minutes, active)
#      and shared its generated `source_id` UUID. See docs/adr/README.md / ADR 0009.
#   2. SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY / SUPABASE_INGEST_JWT are set:
#      a thin config CANNOT run offline (it has no url). For offline/demo runs use
#      a full-format config instead (see sources.demo.yaml).
#
# Per thin source (only these three keys):
#   id               - the source_id UUID from the `sources` table
#   parser_asignado  - the parser that handles this source's shape (under code review)
#   enabled          - run this source in this deployment (AND-ed with sources.active)
#
# Valid parsers/types are documented alongside the parser registry (run_pipeline
# _get_parser) and the `sources.source_type` column. Trust tier lives in the DB
# (`sources.governed_tier`, A/B/C/D); it is no longer expressed in the repo.
#
# project.event_id must be a valid UUID: it is injected into every Person exported
# by the pipeline (persons.event_id is NOT NULL in the DB schema).

project:
  event_id: 8f14e45f-ceea-467e-bd5d-0a4f2e0c1a3a
  default_country: Venezuela

sources:
  # Replace the placeholder UUIDs with the real source_id values from `sources`.
  - id: 00000000-0000-0000-0000-000000000000
    parser_asignado: encuentralos
    enabled: false

  - id: 11111111-1111-1111-1111-111111111111
    parser_asignado: json_generic
    enabled: false

  - id: 22222222-2222-2222-2222-222222222222
    parser_asignado: html
    enabled: false
